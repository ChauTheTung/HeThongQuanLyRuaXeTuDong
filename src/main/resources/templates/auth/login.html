<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập | AUTO WASH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body class="auth-body">

<div class="auth-shell">
    <!-- Trái: form đăng nhập -->
    <section class="auth-form-panel">
        <a th:href="@{/}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="AUTO WASH" width="42" height="42"/>
            <span>AUTO WASH</span>
        </a>

        <h1 class="auth-heading">Đăng nhập AUTO WASH</h1>

        <div class="auth-social">
            <a href="#" title="Facebook" aria-label="Đăng nhập Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" title="Google" aria-label="Đăng nhập Google"><i class="bi bi-google"></i></a>
            <a href="#" title="LinkedIn" aria-label="Đăng nhập LinkedIn"><i class="bi bi-linkedin"></i></a>
        </div>

        <p class="auth-divider">hoặc dùng tài khoản của bạn:</p>

        <form class="auth-form" th:action="@{/login}" method="post">
            <div class="auth-field">
                <i class="bi bi-person"></i>
                <input type="text" name="username" placeholder="Tên đăng nhập" required autocomplete="username"/>
            </div>
            <div class="auth-field">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" placeholder="Mật khẩu" required autocomplete="current-password"/>
            </div>
            <p class="auth-forgot">
                <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
            </p>
            <button type="submit" class="auth-submit">ĐĂNG NHẬP</button>
        </form>
    </section>

    <!-- Phải: CTA đăng ký -->
    <aside class="auth-cta-panel">
        <div class="auth-cta-shapes" aria-hidden="true">
            <span class="shape-1"></span>
            <span class="shape-2"></span>
            <span class="shape-3"></span>
        </div>
        <div class="auth-cta-content">
            <h2>Xin chào bạn!</h2>
            <p>Nhập thông tin cá nhân và bắt đầu hành trình rửa xe thông minh cùng chúng tôi.</p>
            <a th:href="@{/register}" class="auth-cta-btn">ĐĂNG KÝ</a>
        </div>
    </aside>
</div>

</body>
</html>
