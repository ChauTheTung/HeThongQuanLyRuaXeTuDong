<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký | AUTO WASH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body class="auth-body">

<div class="auth-shell">
    <!-- Trái: CTA đăng nhập -->
    <aside class="auth-cta-panel auth-cta-panel--left">
        <div class="auth-cta-shapes" aria-hidden="true">
            <span class="shape-1"></span>
            <span class="shape-2"></span>
            <span class="shape-3"></span>
        </div>
        <div class="auth-cta-content">
            <h2>Chào mừng trở lại!</h2>
            <p>Để tiếp tục kết nối với chúng tôi, vui lòng đăng nhập bằng thông tin cá nhân của bạn.</p>
            <a th:href="@{/login}" class="auth-cta-btn">ĐĂNG NHẬP</a>
        </div>
    </aside>

    <!-- Phải: form đăng ký -->
    <section class="auth-form-panel auth-form-panel--register">
        <a th:href="@{/}" class="auth-logo">
            <img th:src="@{/images/logo.png}" alt="AUTO WASH" width="42" height="42"/>
            <span>AUTO WASH</span>
        </a>

        <h1 class="auth-heading">Tạo tài khoản</h1>

        <div class="auth-social">
            <a href="#" title="Facebook" aria-label="Đăng ký Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" title="Google" aria-label="Đăng ký Google"><i class="bi bi-google"></i></a>
            <a href="#" title="LinkedIn" aria-label="Đăng ký LinkedIn"><i class="bi bi-linkedin"></i></a>
        </div>

        <p class="auth-divider">hoặc dùng email để đăng ký:</p>

        <form class="auth-form" th:action="@{/register}" method="post">
            <div class="auth-field">
                <i class="bi bi-person"></i>
                <input type="text" name="fullName" placeholder="Họ và tên" required autocomplete="name"/>
            </div>
            <div class="auth-field">
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" placeholder="Email" required autocomplete="email"/>
            </div>
            <div class="auth-field">
                <i class="bi bi-telephone"></i>
                <input type="text" name="phoneNumber" placeholder="Số điện thoại" required autocomplete="tel"/>
            </div>
            <div class="auth-field">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" placeholder="Mật khẩu" required minlength="8" autocomplete="new-password"/>
            </div>
            <button type="submit" class="auth-submit auth-submit--wide">ĐĂNG KÝ</button>
        </form>
    </section>
</div>

</body>
</html>
