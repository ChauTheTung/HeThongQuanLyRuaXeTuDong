<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Quản lý khuyến mãi')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <div class="aw-main">
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2>Quản lý khuyến mãi</h2>
                        <p>Thêm, bật/tắt hoặc xóa chương trình khuyến mãi nhanh chóng.</p>
                    </div>
                </div>

                <form th:action="@{/admin/promotions}" method="post" class="aw-form-grid">
                    <div class="aw-form-group">
                        <label for="name">Tên khuyến mãi</label>
                        <input type="text" id="name" name="name" placeholder="Ưu đãi mùa hè" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="tierName">Hạng áp dụng</label>
                        <input type="text" id="tierName" name="tierName" placeholder="Gold" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="discountPercent">Giảm (%)</label>
                        <input type="number" id="discountPercent" name="discountPercent" min="0" max="100" step="0.1" required/>
                    </div>
                    <div class="aw-form-group aw-form-group--full">
                        <label for="description">Mô tả</label>
                        <input type="text" id="description" name="description" placeholder="Mô tả ưu đãi"/>
                    </div>
                    <div class="aw-form-actions" style="grid-column: 1 / -1;">
                        <button type="submit" class="aw-btn aw-btn--primary">Tạo khuyến mãi</button>
                    </div>
                </form>
            </section>

            <section class="aw-card">
                <h3>Danh sách khuyến mãi</h3>
                <table class="aw-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên</th>
                            <th>Hạng</th>
                            <th>Giảm (%)</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="promo : ${promotions}">
                            <td th:text="${promo.id}">1</td>
                            <td th:text="${promo.name}">Ưu đãi</td>
                            <td th:text="${promo.tierName}">Gold</td>
                            <td th:text="${promo.discountPercent}">10</td>
                            <td th:text="${promo.active ? 'Hoạt động' : 'Tạm dừng'}">Hoạt động</td>
                            <td>
                                <form th:action="@{/admin/promotions/{id}/toggle(id=${promo.id})}" method="post" style="display:inline-block; margin-right:0.5rem;">
                                    <button type="submit" class="aw-btn aw-btn--ghost" th:text="${promo.active ? 'Tắt' : 'Bật'}">Tắt</button>
                                </form>
                                <form th:action="@{/admin/promotions/{id}/delete(id=${promo.id})}" method="post" style="display:inline-block;">
                                    <button type="submit" class="aw-btn aw-btn--danger">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${promotions == null or #lists.isEmpty(promotions)}">
                            <td colspan="6">Chưa có khuyến mãi nào.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</div>
</body>
</html>
