<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Báo cáo')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <div class="aw-main">
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2>Báo cáo vận hành</h2>
                        <p>Phân tích doanh thu, số lượng đặt chỗ và hiệu suất hoạt động.</p>
                    </div>
                </div>
                <div class="aw-card__grid">
                    <div class="aw-stat-card">
                        <span class="aw-stat-card__label">Doanh thu</span>
                        <strong class="aw-stat-card__value" th:text="${summary.totalRevenue}">0</strong>
                    </div>
                    <div class="aw-stat-card">
                        <span class="aw-stat-card__label">Đặt chỗ hoàn thành</span>
                        <strong class="aw-stat-card__value" th:text="${summary.completedBookings}">0</strong>
                    </div>
                    <div class="aw-stat-card">
                        <span class="aw-stat-card__label">Đặt chỗ đang chờ</span>
                        <strong class="aw-stat-card__value" th:text="${summary.pendingBookings}">0</strong>
                    </div>
                    <div class="aw-stat-card">
                        <span class="aw-stat-card__label">Khách hàng</span>
                        <strong class="aw-stat-card__value" th:text="${summary.totalCustomers}">0</strong>
                    </div>
                </div>

                <section class="aw-card aw-card--stacked">
                    <h3>Thống kê theo trạng thái</h3>
                    <ul class="aw-list">
                        <li th:each="entry : ${bookingStats.entrySet()}">
                            <span th:text="${entry.key}">PENDING</span>
                            <strong th:text="${entry.value}">0</strong>
                        </li>
                    </ul>
                </section>
            </section>
        </main>
    </div>
</div>
</body>
</html>
