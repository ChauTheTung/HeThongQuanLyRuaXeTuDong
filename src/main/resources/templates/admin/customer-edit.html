<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Chỉnh sửa khách hàng')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <div class="aw-main">
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2>Chỉnh sửa khách hàng</h2>
                        <p>Cập nhật thông tin khách hàng và lưu lại thay đổi.</p>
                    </div>
                </div>
                <form th:action="@{/admin/customers/{id}(id=${customer.id})}" th:object="${customer}" method="post" class="aw-form-grid">
                    <div class="aw-form-group">
                        <label for="fullName">Họ tên</label>
                        <input id="fullName" th:field="*{fullName}" type="text" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="email">Email</label>
                        <input id="email" th:field="*{email}" type="email" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="phoneNumber">Số điện thoại</label>
                        <input id="phoneNumber" th:field="*{phoneNumber}" type="text" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="loyaltyPoints">Điểm thưởng</label>
                        <input id="loyaltyPoints" th:field="*{loyaltyPoints}" type="number" min="0"/>
                    </div>
                    <div class="aw-form-group">
                        <label for="createdAt">Tạo lúc</label>
                        <input id="createdAt" type="text" th:value="${#temporals.format(customer.createdAt, 'dd/MM/yyyy HH:mm')}" readonly/>
                    </div>
                    <div class="aw-form-group">
                        <label for="updatedAt">Cập nhật</label>
                        <input id="updatedAt" type="text" th:value="${#temporals.format(customer.updatedAt, 'dd/MM/yyyy HH:mm')}" readonly/>
                    </div>
                    <div class="aw-form-actions" style="grid-column: 1 / -1; display:flex; gap:1rem; flex-wrap:wrap;">
                        <button type="submit" class="aw-btn aw-btn--primary">Lưu thay đổi</button>
                        <a th:href="@{/admin/customers}" class="aw-btn aw-btn--ghost">Hủy</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
</div>
</body>
</html>
