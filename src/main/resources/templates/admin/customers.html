<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Danh sách khách hàng')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <div class="aw-main">
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2>Khách hàng</h2>
                        <p>Danh sách khách hàng đang dùng dịch vụ.</p>
                    </div>
                    <form th:action="@{/admin/customers}" method="get" style="display:flex; gap:0.75rem; align-items:center; margin-top:1rem;">
                        <input type="text" name="q" th:value="${query}" placeholder="Tìm theo tên hoặc email" class="aw-input"/>
                        <button type="submit" class="aw-btn aw-btn--secondary">Tìm kiếm</button>
                    </form>
                </div>
                <table class="aw-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>Số điện thoại</th>
                            <th>Điểm thưởng</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="customer : ${customers}">
                            <td th:text="${customer.id}">1</td>
                            <td th:text="${customer.fullName}">Nguyễn Văn A</td>
                            <td th:text="${customer.email}">email@example.com</td>
                            <td th:text="${customer.phoneNumber}">0901234567</td>
                            <td th:text="${customer.loyaltyPoints}">0</td>
                            <td>
                                <a th:href="@{/admin/customers/{id}/edit(id=${customer.id})}" class="aw-btn aw-btn--secondary">Sửa</a>
                                <form th:action="@{/admin/customers/{id}/delete(id=${customer.id})}" method="post" style="display:inline-block; margin-left:0.5rem;">
                                    <button type="submit" class="aw-btn aw-btn--ghost" onclick="return confirm('Bạn có chắc muốn xóa khách hàng này?');">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${customers == null or #lists.isEmpty(customers)}">
                            <td colspan="6">Chưa có khách hàng nào.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</div>
</body>
</html>
