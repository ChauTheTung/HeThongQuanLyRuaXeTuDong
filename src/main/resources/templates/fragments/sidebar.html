<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<!--
  Fragment sidebar khách hàng.
  Tham số activeMenu: home | booking | vehicles | history | loyalty | promotions | notifications | profile
  Tham số notificationCount (tùy chọn, mặc định 3)
-->
<aside class="aw-sidebar" th:fragment="customer-sidebar(activeMenu, notificationCount)"
       th:with="notifCount=${notificationCount != null ? notificationCount : 3}">

    <div class="aw-sidebar__brand">
        <img class="aw-sidebar__logo" th:src="@{/images/logo.png}" alt="Auto Wash" width="44" height="44"/>
        <div class="aw-sidebar__brand-text">
            <h1 class="aw-sidebar__title">AUTO WASH</h1>
            <p class="aw-sidebar__tagline">Tự Động Hôm Nay - Bóng Đẹp Mỗi Ngày</p>
        </div>
    </div>

    <nav class="aw-sidebar__nav" aria-label="Menu khách hàng">
        <a th:href="@{/customer/dashboard}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'home'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-house-door"></i>
            <span>Trang chủ</span>
        </a>

        <a th:href="@{/customer/booking}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'booking'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-calendar-check"></i>
            <span>Đặt lịch rửa xe</span>
        </a>

        <a th:href="@{/customer/vehicles}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'vehicles'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-car-front"></i>
            <span>Xe của tôi</span>
        </a>

        <a th:href="@{/customer/history}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'history'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-clock-history"></i>
            <span>Lịch sử đặt chỗ</span>
        </a>

        <a th:href="@{/customer/loyalty}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'loyalty'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-star"></i>
            <span>Điểm thưởng</span>
        </a>

        <a th:href="@{/customer/promotions}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'promotions'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-tag"></i>
            <span>Khuyến mãi</span>
        </a>

        <a th:href="@{/customer/notifications}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'notifications'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-bell"></i>
            <span>Thông báo</span>
            <span class="aw-sidebar__badge" th:if="${notifCount > 0}" th:text="${notifCount}">3</span>
        </a>

        <a th:href="@{/customer/profile}"
           class="aw-sidebar__link"
           th:classappend="${activeMenu == 'profile'} ? ' aw-sidebar__link--active' : ''">
            <i class="bi bi-person"></i>
            <span>Hồ sơ</span>
        </a>

        <a th:href="@{/logout}" class="aw-sidebar__link aw-sidebar__link--logout">
            <i class="bi bi-box-arrow-right"></i>
            <span>Đăng xuất</span>
        </a>
    </nav>

    <div class="aw-sidebar__promo">
        <div class="aw-sidebar__promo-bg" aria-hidden="true"></div>
        <div class="aw-sidebar__promo-content">
            <p class="aw-sidebar__promo-title">Rửa tự động thông minh</p>
            <p class="aw-sidebar__promo-desc">Nhanh chóng · Sạch bóng · Tiện lợi</p>
        </div>
        <div class="aw-sidebar__promo-dots" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
        </div>
    </div>
</aside>

</body>
</html>
