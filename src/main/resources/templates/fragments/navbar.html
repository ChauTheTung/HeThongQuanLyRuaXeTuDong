<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<body>

<!--
  Fragment navbar khách hàng.
  Tham số (tùy chọn): userName, memberTier, loyaltyPoints, notificationCount, avatarUrl
-->
<header class="aw-navbar" th:fragment="customer-navbar(userName, memberTier, loyaltyPoints, notificationCount, avatarUrl)"
        th:with="
            displayName=${userName != null ? userName : 'Nguyễn Văn A'},
            tier=${memberTier != null ? memberTier : 'Gold Member'},
            points=${loyaltyPoints != null ? loyaltyPoints : '1.200'},
            notifCount=${notificationCount != null ? notificationCount : 3},
            avatar=${avatarUrl != null ? avatarUrl : 'https://i.pravatar.cc/80?img=12'}
        ">

    <form class="aw-navbar__search" role="search" th:action="@{/customer/search}" method="get">
        <i class="bi bi-search" aria-hidden="true"></i>
        <input type="search" name="q"
               placeholder="Tìm kiếm dịch vụ, lịch hẹn..."
               aria-label="Tìm kiếm dịch vụ, lịch hẹn"/>
    </form>

    <div class="aw-navbar__actions">
        <a th:href="@{/customer/loyalty}" class="aw-navbar__member" title="Hạng thành viên">
            <i class="bi bi-star-fill aw-navbar__member-star" aria-hidden="true"></i>
            <span class="aw-navbar__member-info">
                <span class="aw-navbar__member-tier" th:text="${tier}">Gold Member</span>
                <span class="aw-navbar__member-points">
                    <span th:text="${points}">1.200</span> điểm
                </span>
            </span>
        </a>

        <a th:href="@{/customer/notifications}" class="aw-navbar__icon-btn" title="Thông báo"
           th:attr="aria-label=${'Thông báo, ' + notifCount + ' chưa đọc'}">
            <i class="bi bi-bell"></i>
            <span class="aw-navbar__icon-badge" th:if="${notifCount > 0}" th:text="${notifCount}">3</span>
        </a>

        <div class="aw-navbar__dropdown" tabindex="0">
            <button type="button" class="aw-navbar__profile" aria-haspopup="true">
                <img class="aw-navbar__avatar" th:src="${avatar}" th:alt="${displayName}" width="38" height="38"/>
                <span class="aw-navbar__name" th:text="${displayName}">Nguyễn Văn A</span>
                <i class="bi bi-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="aw-navbar__dropdown-menu" role="menu">
                <li><a th:href="@{/customer/profile}" role="menuitem">Hồ sơ của tôi</a></li>
                <li><a th:href="@{/customer/history}" role="menuitem">Lịch sử đặt chỗ</a></li>
                <li><a th:href="@{/customer/loyalty}" role="menuitem">Điểm thưởng</a></li>
                <li><a th:href="@{/logout}" role="menuitem">Đăng xuất</a></li>
            </ul>
        </div>
    </div>
</header>

</body>
</html>
