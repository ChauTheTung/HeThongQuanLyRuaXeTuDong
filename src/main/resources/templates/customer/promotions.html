<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Khuyến mãi')}"></head>
<body class="aw-customer-body">
<div class="aw-app" th:with="notifCount=${notifCount}">
    <aside th:replace="~{fragments/sidebar :: customer-sidebar('promotions', ${notifCount})}"></aside>
    <div class="aw-main">
        <header th:replace="~{fragments/navbar :: customer-navbar(null, null, null, notifCount, null)}"></header>
        <main class="aw-main__content">
            <section class="aw-card">
                <h2>Khuyến mãi đang áp dụng</h2>
                <div th:if="${promotions != null and !#lists.isEmpty(promotions)}">
                    <div th:each="promo : ${promotions}" class="aw-card aw-card--small">
                        <h3 th:text="${promo.name}">Ưu đãi đặc biệt</h3>
                        <p th:text="${promo.description}">Giảm giá 10% cho thành viên Gold</p>
                        <p><strong>Giảm:</strong> <span th:text="${promo.discountPercent}">10</span>%</p>
                    </div>
                </div>
                <div th:if="${promotions == null or #lists.isEmpty(promotions)}">
                    <p>Hiện tại không có khuyến mãi nào.</p>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
