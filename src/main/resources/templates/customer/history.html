<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Lịch sử đặt chỗ')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <aside th:replace="~{fragments/sidebar :: customer-sidebar('history', ${notifCount})}"></aside>
    <div class="aw-main">
        <header th:replace="~{fragments/navbar :: customer-navbar(${profile.fullName}, ${memberTier}, ${loyaltyPoints}, ${redeemablePoints}, ${notifCount}, null)}"></header>
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2>Lịch sử đặt chỗ</h2>
                        <p>Kiểm tra trạng thái và lịch sử các lần rửa xe đã thực hiện.</p>
                    </div>
                    <form th:action="@{/customer/history}" method="get" style="display:flex; gap:0.75rem; align-items:center; margin-top:1rem;">
                        <label for="status">Lọc trạng thái:</label>
                        <select id="status" name="status" class="aw-select">
                            <option value="" th:selected="${selectedStatus == null}">Tất cả</option>
                            <option th:each="statusOption : ${statusOptions}"
                                    th:value="${statusOption}"
                                    th:text="${statusOption}"
                                    th:selected="${statusOption == selectedStatus}"></option>
                        </select>
                        <button type="submit" class="aw-btn aw-btn--secondary">Lọc</button>
                    </form>
                </div>
                <table class="aw-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Xe</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Giá</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.id}">1</td>
                        <td th:text="${booking.vehicleId}">Xe</td>
                        <td th:text="${#temporals.format(booking.bookingTime, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                        <td th:text="${booking.status}">COMPLETED</td>
                        <td th:text="${booking.totalPrice != null ? #numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT') : '0'}">0</td>
                    </tr>
                    <tr th:if="${bookings == null or #lists.isEmpty(bookings)}">
                        <td colspan="5">Chưa có lịch sử đặt chỗ.</td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</div>
</body>
</html>
