<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lỗi truy cập | AUTO WASH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #e2e8f0;
        }
        .error-box {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 480px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            line-height: 1;
        }
        h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; color: #f1f5f9; }
        p  { color: #94a3b8; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin: 0.4rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
        }
        .alert {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #fbbf24;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="error-box">
    <div class="error-code">403</div>
    <h1>Không có quyền truy cập</h1>
    <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}">
        Bạn không có quyền truy cập vào trang này.
    </div>
    <p>Tài khoản của bạn không có đủ quyền hạn để xem nội dung này. Vui lòng quay lại trang chủ hoặc đăng nhập với tài khoản có quyền.</p>
    <a href="/dashboard" class="btn">Về trang chủ</a>
    <a href="/logout" class="btn btn-outline">Đăng xuất</a>
</div>
</body>
</html>
