# Chuỗi kết nối đến MySQL cục bộ (Tự động tạo database autowash_db nếu chưa có)
spring.datasource.url=jdbc:mysql://localhost:3306/autowash_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin1234

# Log câu lệnh SQL ra console và tự động cập nhật cấu trúc bảng dữ liệu
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
spring.thymeleaf.cache=false

# Nếu cần tạm tắt cấu hình DB, bỏ comment các dòng sau
# spring.autoconfigure.exclude=\
#   org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
#   org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
