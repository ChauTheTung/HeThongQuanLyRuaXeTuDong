<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Xe của tôi')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <aside th:replace="~{fragments/sidebar :: customer-sidebar('vehicles', ${notifCount})}"></aside>
    <div class="aw-main">
        <header th:replace="~{fragments/navbar :: customer-navbar(${profile.fullName}, ${memberTier}, ${loyaltyPoints}, ${notifCount}, null)}"></header>
        <main class="aw-main__content">
            <section class="aw-card aw-card--grid">
                <div>
                    <h2>Xe của tôi</h2>
                    <p>Quản lý xe đã đăng ký và thêm xe mới cho dịch vụ.</p>
                </div>
                <div>
                    <form th:action="@{/customer/vehicles}" method="post" th:object="${newVehicle}" class="aw-form-grid">
                        <div class="aw-form-group">
                            <label for="licensePlate">Biển số</label>
                            <input type="text" id="licensePlate" name="licensePlate" placeholder="ABC-1234" required/>
                        </div>
                        <div class="aw-form-group">
                            <label for="vehicleType">Loại xe</label>
                            <input type="text" id="vehicleType" name="vehicleType" placeholder="Sedan / SUV" required/>
                        </div>
                        <div class="aw-form-group">
                            <label for="brand">Thương hiệu</label>
                            <input type="text" id="brand" name="brand" placeholder="Toyota"/>
                        </div>
                        <div class="aw-form-group">
                            <label for="color">Màu sắc</label>
                            <input type="text" id="color" name="color" placeholder="Đỏ"/>
                        </div>
                        <div class="aw-form-group aw-form-group--full">
                            <label for="notes">Ghi chú</label>
                            <input type="text" id="notes" name="notes" placeholder="Gara hoặc nhu cầu đặc biệt"/>
                        </div>
                        <div class="aw-form-actions" style="grid-column: 1 / -1;">
                            <button type="submit" class="aw-btn aw-btn--primary">Thêm xe mới</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="aw-card">
                <h3>Danh sách xe</h3>
                <table class="aw-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Biển số</th>
                        <th>Loại xe</th>
                        <th>Thương hiệu</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="vehicle : ${vehicles}">
                        <td th:text="${vehicle.id}">1</td>
                        <td th:text="${vehicle.licensePlate}">ABC-123</td>
                        <td th:text="${vehicle.vehicleType}">Sedan</td>
                        <td th:text="${vehicle.brand}">Toyota</td>
                        <td>
                            <form th:action="@{/customer/vehicles/{id}/delete(id=${vehicle.id})}" method="post">
                                <button type="submit" class="aw-btn aw-btn--ghost">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${vehicles == null or #lists.isEmpty(vehicles)}">
                        <td colspan="5">Bạn chưa đăng ký xe nào.</td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</div>
</body>
</html>
