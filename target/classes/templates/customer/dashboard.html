<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Trang chủ')}"></head>
<body class="aw-customer-body">

<div class="aw-app">
    <aside th:replace="~{fragments/sidebar :: customer-sidebar('home', ${notifCount})}"></aside>

    <div class="aw-main">
        <header th:replace="~{fragments/navbar :: customer-navbar(${profile.fullName}, ${memberTier}, ${loyaltyPoints}, ${notifCount}, null)}"></header>

        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2 th:text="'Xin chào, ' + ${profile.fullName} + ' 👋'">Xin chào, Khách hàng</h2>
                        <p>Quản lý toàn bộ dịch vụ rửa xe, hồ sơ và ưu đãi của bạn.</p>
                    </div>
                </div>
            </section>

            <section class="aw-card aw-card--grid">
                <div class="aw-stat-card">
                    <span class="aw-stat-card__label">Thành viên</span>
                    <strong class="aw-stat-card__value" th:text="${memberTier}">Bronze</strong>
                </div>
                <div class="aw-stat-card">
                    <span class="aw-stat-card__label">Điểm thưởng</span>
                    <strong class="aw-stat-card__value" th:text="${loyaltyPoints}">0</strong>
                </div>
                <div class="aw-stat-card">
                    <span class="aw-stat-card__label">Xe đã đăng ký</span>
                    <strong class="aw-stat-card__value" th:text="${vehicleCount}">0</strong>
                </div>
                <div class="aw-stat-card">
                    <span class="aw-stat-card__label">Lịch sử rửa</span>
                    <strong class="aw-stat-card__value" th:text="${totalWashes}">0</strong>
                </div>
            </section>

            <section class="aw-card">
                <h3>Trạng thái gần nhất</h3>
                <p>Truy cập nhanh vào đặt lịch, xe và khuyến mãi hiện tại.</p>
                <div class="aw-card__footer">
                    <a th:href="@{/customer/booking}" class="aw-btn aw-btn--primary">Xem đặt lịch</a>
                    <a th:href="@{/customer/vehicles}" class="aw-btn aw-btn--outline">Quản lý xe</a>
                </div>
            </section>
        </main>

        <footer th:replace="~{fragments/footer :: customer-footer}"></footer>
    </div>
</div>

</body>
</html>
