<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Quản lý Loyalty')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <div class="aw-main">
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-page-header">
                    <div>
                        <h2>Quản lý Loyalty</h2>
                        <p>Thêm xếp hạng mới và quản lý mức điểm thưởng cho khách hàng.</p>
                    </div>
                </div>

                <form th:action="@{/admin/loyalty}" method="post" class="aw-form-grid">
                    <div class="aw-form-group">
                        <label for="name">Tên hạng</label>
                        <input type="text" id="name" name="name" placeholder="Bronze / Silver / Gold" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="minPoints">Điểm tối thiểu</label>
                        <input type="number" id="minPoints" name="minPoints" min="0" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="maxPoints">Điểm tối đa</label>
                        <input type="number" id="maxPoints" name="maxPoints" min="0" required/>
                    </div>
                    <div class="aw-form-group">
                        <label for="discountPercent">Giảm giá (%)</label>
                        <input type="number" id="discountPercent" name="discountPercent" min="0" max="100" step="0.1" required/>
                    </div>
                    <div class="aw-form-actions" style="grid-column: 1 / -1;">
                        <button type="submit" class="aw-btn aw-btn--primary">Thêm hạng mới</button>
                    </div>
                </form>
            </section>

            <section class="aw-card">
                <h3>Danh sách hạng loyalty</h3>
                <table class="aw-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hạng</th>
                            <th>Điểm tối thiểu</th>
                            <th>Điểm tối đa</th>
                            <th>Ưu đãi</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tier : ${tiers}">
                            <td th:text="${tier.id}">1</td>
                            <td th:text="${tier.name}">Bronze</td>
                            <td th:text="${tier.minPoints}">0</td>
                            <td th:text="${tier.maxPoints}">499</td>
                            <td th:text="${tier.discountPercent != null ? tier.discountPercent + '%' : '0%'}">0%</td>
                            <td>
                                <form th:action="@{/admin/loyalty/{id}/delete(id=${tier.id})}" method="post">
                                    <button type="submit" class="aw-btn aw-btn--danger">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${tiers == null or #lists.isEmpty(tiers)}">
                            <td colspan="6">Chưa có hạng Loyalty nào.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
</div>
</body>
</html>
