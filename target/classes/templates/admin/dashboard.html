<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/customer-head :: customer-head('Quản trị hệ thống')}"></head>
<body class="aw-customer-body">
<div class="aw-app">
    <div class="aw-main">
        <main class="aw-main__content">
            <section class="aw-card">
                <div class="aw-card__header">
                    <h2>Bảng điều khiển Admin</h2>
                    <p>Thông tin tổng quan về doanh thu, đặt chỗ và khách hàng.</p>
                </div>
                <div class="aw-card__body">
                    <div>
                        <strong>Tổng doanh thu:</strong>
                        <span th:text="${summary.totalRevenue} ?: 0">0</span>
                    </div>
                    <div>
                        <strong>Đặt chỗ hoàn thành:</strong>
                        <span th:text="${summary.completedBookings} ?: 0">0</span>
                    </div>
                    <div>
                        <strong>Đặt chỗ đang chờ:</strong>
                        <span th:text="${summary.pendingBookings} ?: 0">0</span>
                    </div>
                    <div>
                        <strong>Khách hàng:</strong>
                        <span th:text="${summary.totalCustomers} ?: 0">0</span>
                    </div>
                </div>
            </section>
            <section class="aw-card">
                <h3>Thống kê đặt chỗ</h3>
                <ul>
                    <li th:each="entry : ${bookingStats}">
                        <strong th:text="${entry.key}"></strong>: <span th:text="${entry.value}">0</span>
                    </li>
                </ul>
            </section>
            <section class="aw-card">
                <h3>Khách hàng</h3>
                <p><strong>Tổng khách hàng:</strong> <span th:text="${customerStats.totalCustomers}">0</span></p>
            </section>
        </main>
    </div>
</div>
</body>
</html>
